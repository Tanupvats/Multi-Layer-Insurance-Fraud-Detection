name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # The heavy torch/ultralytics stack makes a CPU-only CI install take
      # 3-5 minutes. We install only the deps the tests actually need;
      # real training is validated separately on a GPU runner (not here).
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            numpy pillow pyyaml \
            pydantic pydantic-settings \
            fastapi 'uvicorn[standard]' python-multipart \
            pytest ruff

      # torch/torchvision are needed by training.utils (triplet loss uses
      # real torch ops) — CPU wheels from the default index.
      - name: Install torch (CPU wheels)
        run: pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision

      - name: Lint
        run: ruff check src api inference training tests

      - name: Run tests
        env:
          AUTOSHIELD_APP_ENV: dev
          AUTOSHIELD_ALLOW_MODEL_DOWNLOAD: "false"
          AUTOSHIELD_DEVICE: cpu
        run: pytest -v

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        # Just confirm the Dockerfile still builds; we don't push anywhere.
        run: docker build -t autoshield:ci .
